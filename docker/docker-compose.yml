services:
  db:
    image: postgres:16-alpine
    container_name: triageiq_db
    environment:
      POSTGRES_USER: triageiq
      POSTGRES_PASSWORD: triageiq
      POSTGRES_DB: triageiq
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U triageiq -d triageiq"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
  redis:
    image: redis:7-alpine
    container_name: triageiq_redis
    command: redis-server --save 60 1 --loglevel warning
    ports:
        - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped


volumes:
  postgres_data:
  redis_data:

