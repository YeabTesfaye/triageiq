
services:
  db:
    image: postgres:16-alpine
    container_name: triageiq_db
    environment:
      POSTGRES_USER: triageiq
      POSTGRES_PASSWORD: triageiq
      POSTGRES_DB: triageiq
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U triageiq -d triageiq"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: triageiq_redis
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: triageiq_api
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://triageiq:triageiq@db:5432/triageiq
      REDIS_URL: redis://redis:6379/0
      ENV: production
    ports:
      - "8000:8000"
    restart: unless-stopped
    env_file:
      - .env

volumes:
  postgres_data:
  redis_data:
