name: CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
env:
  PYTHON_VERSION: "3.12"
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: uv sync --frozen --all-extras
      - name: Run ruff
        run: uv run ruff check app/ tests/
      - name: Run black
        run: uv run black --check app/ tests/

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: uv sync --frozen --all-extras
      - name: Run mypy
        run: uv run mypy app/ --ignore-missing-imports --no-strict-optional

  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: triageiq
          POSTGRES_PASSWORD: triageiq
          POSTGRES_DB: triageiq
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U triageiq -d triageiq"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 10s
      redis:
        image: redis:7-alpine
        ports:
          - "6379:6379"
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 10s
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: uv sync --frozen --all-extras
      - name: Run migrations
        env:
          DATABASE_URL: "postgresql+asyncpg://triageiq:triageiq@localhost:5432/triageiq"
        run: uv run alembic upgrade head
      - name: Run tests
        env:
          JWT_SECRET_KEY: "testsecretkey_minimum_32_characters_required"
          DATABASE_URL: "postgresql+asyncpg://triageiq:triageiq@localhost:5432/triageiq"
          REDIS_URL: "redis://localhost:6379/0"
          OPENAI_API_KEY: "sk-test-placeholder"
          ENV: "development"
          BCRYPT_ROUNDS: "4"
        run: |
          uv run pytest tests/ \
            --tb=short \
            --cov=app \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            -v
      - name: Check for migrations 
        run : uv run alembic check 
      - name: Run migrations
        env:
          DATABASE_URL: "postgresql+asyncpg://triageiq:triageiq@localhost:5432/triageiq"
          FIREBASE_DATABASE_URL: "https://placeholder.firebaseio.com"   # ← add
        run: uv run alembic upgrade head

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        run: docker build -f docker/Dockerfile -t triageiq:${{ github.sha }} .